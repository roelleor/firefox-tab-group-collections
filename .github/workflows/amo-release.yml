name: Publish to AMO

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node dependencies
        run: |
          set -euo pipefail
          npm ci

      - name: Install Firefox Developer Edition
        run: |
          set -euo pipefail
          curl -L "https://download.mozilla.org/?product=firefox-devedition-latest-ssl&os=linux64&lang=en-US" -o /tmp/firefox-devedition.tar.bz2
          mkdir -p "$HOME/firefox-devedition"
          tar -xjf /tmp/firefox-devedition.tar.bz2 -C "$HOME/firefox-devedition" --strip-components=1
          echo "FIREFOX_BIN=$HOME/firefox-devedition/firefox" >> "$GITHUB_ENV"

      - name: Run release tooling tests
        run: |
          set -euo pipefail
          npm test

      - name: Check extension JavaScript syntax
        run: |
          set -euo pipefail
          npm run check:js

      - name: Run Firefox E2E smoke test
        run: |
          set -euo pipefail
          npm run test:e2e

      - name: Verify tag version and build AMO metadata
        env:
          TAG_NAME: ${{ github.ref_name }}
          RUNNER_TEMP_DIR: ${{ runner.temp }}
        run: |
          set -euo pipefail

          VERSION="${TAG_NAME#v}"
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"

          if [ "$VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Tag version ($VERSION) does not match manifest version ($MANIFEST_VERSION)." >&2
            exit 1
          fi

          npm run release-notes -- \
            --version "$VERSION" \
            --changelog changelog.txt \
            --output "$RUNNER_TEMP_DIR/amo-metadata.json"

      - name: Build release source tree
        env:
          RUNNER_TEMP_DIR: ${{ runner.temp }}
        run: |
          set -euo pipefail

          SOURCE_DIR="$RUNNER_TEMP_DIR/amo-source"
          rm -rf "$SOURCE_DIR"
          mkdir -p "$SOURCE_DIR/src"

          cp manifest.json "$SOURCE_DIR/"
          cp -R src/. "$SOURCE_DIR/src/"

      - name: Sign and upload to AMO
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_SIGN_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_SIGN_SECRET }}
          RUNNER_TEMP_DIR: ${{ runner.temp }}
        run: |
          set -euo pipefail

          if [ -z "${WEB_EXT_API_KEY:-}" ] || [ -z "${WEB_EXT_API_SECRET:-}" ]; then
            echo "Missing AMO_SIGN_KEY or AMO_SIGN_SECRET GitHub secret." >&2
            exit 1
          fi

          npx --yes web-ext sign \
            --channel listed \
            --source-dir "$RUNNER_TEMP_DIR/amo-source" \
            --artifacts-dir "$RUNNER_TEMP_DIR/amo-artifacts" \
            --amo-metadata "$RUNNER_TEMP_DIR/amo-metadata.json"

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: amo-signed-addon
          path: ${{ runner.temp }}/amo-artifacts/*
          if-no-files-found: error
