name: Publish to AMO

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      release_ref:
        description: 'Git ref to build and publish (for example 1.2.0, main, or a commit SHA)'
        required: true
        default: 'main'
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Install Node dependencies
        run: |
          set -euo pipefail
          npm ci

      - name: Install Firefox Developer Edition
        run: |
          set -euo pipefail
          curl -L "https://download.mozilla.org/?product=firefox-devedition-latest-ssl&os=linux64&lang=en-US" -o /tmp/firefox-devedition.tar.xz
          mkdir -p "$HOME/firefox-devedition"
          tar -xJf /tmp/firefox-devedition.tar.xz -C "$HOME/firefox-devedition" --strip-components=1
          echo "FIREFOX_BIN=$HOME/firefox-devedition/firefox" >> "$GITHUB_ENV"

      - name: Run release tooling tests
        run: |
          set -euo pipefail
          npm test

      - name: Check extension JavaScript syntax
        run: |
          set -euo pipefail
          npm run check:js

      - name: Run Firefox E2E smoke test
        run: |
          set -euo pipefail
          npm run test:e2e

      - name: Verify tag version and build AMO metadata
        env:
          EVENT_NAME: ${{ github.event_name }}
          TAG_NAME: ${{ github.ref_name }}
          RUNNER_TEMP_DIR: ${{ runner.temp }}
        run: |
          set -euo pipefail

          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          VERSION="$MANIFEST_VERSION"

          if [ "$EVENT_NAME" = "push" ] && [ "${TAG_NAME#v}" != "$MANIFEST_VERSION" ]; then
            echo "Tag version ($VERSION) does not match manifest version ($MANIFEST_VERSION)." >&2
            exit 1
          fi

          npm run release-notes -- \
            --version "$VERSION" \
            --changelog changelog.txt \
            --output "$RUNNER_TEMP_DIR/amo-metadata.json"

      - name: Build release source tree
        env:
          RUNNER_TEMP_DIR: ${{ runner.temp }}
        run: |
          set -euo pipefail

          SOURCE_DIR="$RUNNER_TEMP_DIR/amo-source"
          rm -rf "$SOURCE_DIR"
          mkdir -p "$SOURCE_DIR/src"

          cp manifest.json "$SOURCE_DIR/"
          cp -R src/. "$SOURCE_DIR/src/"

      - name: Sign and upload to AMO
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_SIGN_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_SIGN_SECRET }}
          RUNNER_TEMP_DIR: ${{ runner.temp }}
        run: |
          set -euo pipefail

          if [ -z "${WEB_EXT_API_KEY:-}" ] || [ -z "${WEB_EXT_API_SECRET:-}" ]; then
            echo "Missing AMO_SIGN_KEY or AMO_SIGN_SECRET GitHub secret." >&2
            exit 1
          fi

          LOG_FILE="$RUNNER_TEMP_DIR/web-ext-sign.log"
          set +e
          npx --yes web-ext sign \
            --channel listed \
            --approval-timeout 0 \
            --source-dir "$RUNNER_TEMP_DIR/amo-source" \
            --artifacts-dir "$RUNNER_TEMP_DIR/amo-artifacts" \
            --amo-metadata "$RUNNER_TEMP_DIR/amo-metadata.json" \
            2>&1 | tee "$LOG_FILE"
          SIGN_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [ "$SIGN_EXIT_CODE" -eq 0 ]; then
            exit 0
          fi

          exit "$SIGN_EXIT_CODE"

      - name: Upload AMO submission logs
        uses: actions/upload-artifact@v6
        with:
          name: amo-submission-logs
          path: |
            ${{ runner.temp }}/web-ext-sign.log
            ${{ runner.temp }}/amo-metadata.json
          if-no-files-found: error
